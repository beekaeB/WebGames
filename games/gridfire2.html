<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Blaster: Gridfire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #0d0c1d;
            color: #d0d0d0;
            overflow: hidden;
        }
        canvas {
            background-color: #1a1a2e;
            cursor: crosshair;
            display: block;
        }
        .font-press-start {
            font-family: 'Press Start 2P', cursive;
        }
        .hud-element {
            background-color: rgba(26, 26, 46, 0.7);
            border: 1px solid #e0e0e0;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
        }
        .modal {
            background-color: rgba(13, 12, 29, 0.9);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff inset;
        }
        .btn-primary {
            background-color: #ff00ff;
            color: #ffffff;
            border: 2px solid #ffffff;
            text-shadow: 0 0 5px #000;
            transition: all 0.2s ease-in-out;
        }
        .btn-primary:hover {
            background-color: #ffffff;
            color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }
        /* Custom styles for the difficulty slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #3a3a5e;
            border-radius: 5px;
            border: 1px solid #ff00ff;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #00ffff;
            cursor: pointer;
            margin-top: -9px; /* You need to specify a margin in Chrome, but not in Firefox */
            box-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen m-0">

    <div id="game-container" class="relative shadow-2xl shadow-fuchsia-500/50">
        <canvas id="gameCanvas"></canvas>

        <!-- Heads-Up Display (HUD) -->
        <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none hidden">
            <!-- Left Side: Health & Score -->
            <div class="flex flex-col space-y-2">
                <div class="hud-element">
                    <h2 class="text-sm font-bold text-cyan-300">HEALTH</h2>
                    <div class="w-48 h-4 bg-gray-700 rounded-full border border-cyan-300">
                        <div id="health-bar" class="h-full bg-cyan-300 rounded-full transition-all duration-300" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="hud-element">
                    <h2 class="text-sm font-bold text-blue-300">SHIELD</h2>
                    <div class="w-48 h-4 bg-gray-700 rounded-full border border-blue-300">
                        <div id="shield-bar" class="h-full bg-blue-300 rounded-full transition-all duration-300" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="hud-element">
                    <h2 class="text-sm font-bold text-yellow-300">SCORE</h2>
                    <p id="score" class="text-2xl font-bold">0</p>
                </div>
            </div>

            <!-- Center: Equation -->
            <div id="equation-container" class="hud-element text-center">
                <h2 class="text-sm font-bold text-fuchsia-300">GRIDFIRE EQUATION</h2>
                <p id="equation" class="text-3xl font-bold">12 + 5 = ?</p>
                <p id="player-input" class="text-2xl font-bold h-8 text-green-400">&nbsp;</p>
            </div>

            <!-- Right Side: Overdrive -->
            <div class="hud-element text-right">
                <h2 class="text-sm font-bold text-orange-400">OVERDRIVE</h2>
                <div class="w-32 h-4 bg-gray-700 rounded-full border border-orange-400">
                    <div id="overdrive-bar" class="h-full bg-orange-400 rounded-full transition-all duration-300" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <!-- Start/Game Over Modal -->
        <div id="modal" class="absolute inset-0 flex items-center justify-center">
            <div id="modal-content" class="modal p-8 rounded-lg text-center max-w-lg mx-4 w-full">
                <h1 id="modal-title" class="font-press-start text-4xl mb-4 text-cyan-300">GRIDFIRE</h1>
                <p id="modal-text" class="mb-6 text-lg">Solve math problems to charge your super-weapon. Survive the onslaught.</p>
                <p class="mb-2 text-sm">CONTROLS:</p>
                <p class="mb-6 text-sm"><span class="font-bold text-cyan-300">WASD</span> Move | <span class="font-bold text-cyan-300">Mouse</span> Aim/Shoot | <span class="font-bold text-cyan-300">0-9</span> Type Answer | <span class="font-bold text-cyan-300">Enter</span> Submit</p>

                <!-- Sliders -->
                <div class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="difficulty-slider" class="block text-sm font-bold mb-2 text-cyan-300">DIFFICULTY</label>
                        <input id="difficulty-slider" type="range" min="1" max="30" value="10" class="w-full">
                        <div class="flex justify-between text-xs px-1">
                            <span>Lvl 1</span>
                            <span>Lvl 15</span>
                            <span>Lvl 30</span>
                        </div>
                    </div>
                    <div>
                        <label for="speed-slider" class="block text-sm font-bold mb-2 text-cyan-300">SPEED</label>
                        <input id="speed-slider" type="range" min="1" max="10" value="5" class="w-full">
                        <div class="flex justify-between text-xs px-1">
                            <span>Slow</span>
                            <span>Normal</span>
                            <span>Fast</span>
                        </div>
                    </div>
                </div>

                <button id="start-button" class="btn-primary font-press-start text-xl px-8 py-4 rounded-md mt-4">Start Game</button>
            </div>
        </div>
    </div>

    <script>
        // --- Basic Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');

        let gameWidth = Math.min(window.innerWidth * 0.9, 1200);
        let gameHeight = Math.min(window.innerHeight * 0.9, 800);
        canvas.width = gameWidth;
        canvas.height = gameHeight;
        gameContainer.style.width = `${gameWidth}px`;
        gameContainer.style.height = `${gameHeight}px`;

        // --- Game State & UI Elements ---
        let gameState = 'START'; // START, PLAYING, PAUSED, OVERDRIVE, GAMEOVER
        let score = 0;
        let difficulty = 2;
        let gameSpeed = 5;
        const keys = {};
        const mouse = { x: 0, y: 0, down: false };

        const hud = document.getElementById('hud');
        const healthBar = document.getElementById('health-bar');
        const shieldBar = document.getElementById('shield-bar');
        const scoreDisplay = document.getElementById('score');
        const equationDisplay = document.getElementById('equation');
        const playerInputDisplay = document.getElementById('player-input');
        const overdriveBar = document.getElementById('overdrive-bar');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const startButton = document.getElementById('start-button');
        const difficultySlider = document.getElementById('difficulty-slider');
        const speedSlider = document.getElementById('speed-slider');

        // --- Audio Synthesis with Tone.js ---
        const synth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'fatsawtooth', count: 3, spread: 30 }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 0.4, attackCurve: 'exponential' } }).toDestination();
        const laserSound = () => synth.triggerAttackRelease('C2', '8n', Tone.now(), 0.3);
        const explosionSound = () => synth.triggerAttackRelease(['C1', 'E1', 'G1'], '4n', Tone.now(), 0.8);
        const answerCorrectSound = () => new Tone.Synth({ oscillator: {type: 'triangle'}, envelope: {attack: 0.005, decay: 0.2, sustain: 0.1, release: 0.2}, volume: -5}).toDestination().triggerAttackRelease('G5', '8n');
        const answerIncorrectSound = () => new Tone.Synth({ oscillator: {type: 'square'}, envelope: {attack: 0.01, decay: 0.2, sustain: 0, release: 0.2}, volume: -5}).toDestination().triggerAttackRelease('C3', '8n');
        const overdriveActivateSound = () => new Tone.Synth({ oscillator: {type: 'sawtooth'}, envelope: {attack: 0.1, decay: 0.5, sustain: 0.2, release: 1}, volume: 0}).toDestination().triggerAttackRelease('G4', '1s');
        const powerupSound = () => new Tone.Synth({ oscillator: {type: 'sine'}, envelope: {attack: 0.01, decay: 0.1, sustain: 0.2, release: 0.2}, volume: -3}).toDestination().triggerAttackRelease('A5', '16n');

        // --- Game Entities ---
        let player;
        let projectiles = [];
        let enemies = [];
        let powerUps = [];
        let particles = [];
        let lootDrops = [];

        // --- Game Logic Variables ---
        let currentEquation = { text: '', answer: '' };
        let playerAnswer = '';
        let enemySpawnTimer = 0;
        let powerUpSpawnTimer = 0;
        let overdriveTimer = 0;
        const OVERDRIVE_DURATION = 5000; // 5 seconds
        let pauseTimer = 0;
        const PAUSE_DURATION = 2000; // 2 seconds

        // --- Classes ---
        class Player {
            constructor(x, y, speedSetting) {
                this.x = x;
                this.y = y;
                this.size = 15;
                this.speed = 2 + (speedSetting - 1) * (4 / 9);
                this.angle = 0;
                this.health = 100;
                this.maxHealth = 100;

                // Equipment
                this.weapon = { type: 'weapon', rarity: 'common', name: 'Standard Issue', damage: 5, fireRate: 20, projectileCount: 1, elemental: null };
                this.shield = {
                    type: 'shield', rarity: 'common', name: 'Basic Shield',
                    capacity: 25, rechargeRate: 5, rechargeDelay: 5000,
                    current: 25, rechargeTimer: 0, shieldType: 'standard'
                };

                this.shootCooldown = 0;
                this.overdriveShootCooldown = 0;
                this.fastFireTimer = 0;
            }

            update() {
                // Movement
                if (keys['w']) this.y -= this.speed;
                if (keys['s']) this.y += this.speed;
                if (keys['a']) this.x -= this.speed;
                if (keys['d']) this.x += this.speed;

                // Clamp position
                this.x = Math.max(this.size, Math.min(gameWidth - this.size, this.x));
                this.y = Math.max(this.size, Math.min(gameHeight - this.size, this.y));

                // Aiming
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                this.angle = Math.atan2(dy, dx);

                // Update timers
                if (this.shootCooldown > 0) this.shootCooldown--;
                if (this.overdriveShootCooldown > 0) this.overdriveShootCooldown--;
                if (this.fastFireTimer > 0) this.fastFireTimer--;
                if (this.shield.rechargeTimer > 0) {
                    this.shield.rechargeTimer -= 1000/60;
                } else if (this.shield.current < this.shield.capacity) {
                    this.shield.current = Math.min(this.shield.capacity, this.shield.current + this.shield.rechargeRate / 60);
                    updateShieldBar();
                }

                // Shooting
                if (mouse.down) {
                    const baseCooldown = this.fastFireTimer > 0 ? Math.floor(this.weapon.fireRate / 2) : this.weapon.fireRate;
                    if (gameState === 'PLAYING' && this.shootCooldown === 0) {
                        const spread = 0.2; // Radians
                        for (let i = 0; i < this.weapon.projectileCount; i++) {
                            const angle = this.angle + (Math.random() - 0.5) * spread;
                            projectiles.push(new Projectile(this.x, this.y, angle, 5, 7, '#00ffff', 60, this.weapon.damage, this.weapon.elemental));
                        }
                        this.shootCooldown = baseCooldown;
                        laserSound();
                    } else if (gameState === 'OVERDRIVE' && this.overdriveShootCooldown === 0) {
                        for (let i = 0; i < 24; i++) {
                            const angle = (i / 24) * Math.PI * 2;
                            projectiles.push(new Projectile(this.x, this.y, angle, 3, 10, '#ff00ff', 40, this.weapon.damage * 2, null));
                        }
                        this.overdriveShootCooldown = 5;
                        laserSound();
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Draw Shield
                if (this.shield.current > 0) {
                    const shieldPercentage = this.shield.current / this.shield.capacity;
                    const shieldPulse = this.shield.rechargeTimer > 0 ? Math.abs(Math.sin(Date.now() / 100)) * 0.1 : 0; // Flicker when damaged
                    ctx.fillStyle = `rgba(0, 255, 255, ${0.1 + shieldPulse})`;
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size + 10, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * shieldPercentage), false);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size + 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.rotate(this.angle);
                ctx.fillStyle = gameState === 'OVERDRIVE' ? '#ff00ff' : '#00ffff';
                ctx.shadowColor = gameState === 'OVERDRIVE' ? '#ff00ff' : '#00ffff';
                ctx.shadowBlur = 15;

                ctx.beginPath();
                ctx.moveTo(this.size, 0);
                ctx.lineTo(-this.size / 2, this.size / 1.5);
                ctx.lineTo(-this.size / 2, -this.size / 1.5);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            takeDamage(amount) {
                this.shield.rechargeTimer = this.shield.rechargeDelay;
                let damageAbsorbed = 0;

                if (this.shield.current > 0) {
                    damageAbsorbed = Math.min(this.shield.current, amount);
                    this.shield.current -= damageAbsorbed;
                    amount -= damageAbsorbed;
                    createParticles(this.x, this.y, 10, '#00ffff');
                    updateShieldBar();

                    if (this.shield.current <= 0) {
                        // Shield broke, trigger nova if it's a nova shield
                        if (this.shield.shieldType === 'nova') {
                            createParticles(this.x, this.y, 50, '#ff00ff');
                            explosionSound();
                            enemies.forEach(e => {
                                if (Math.hypot(this.x - e.x, this.y - e.y) < this.shield.novaRadius) {
                                    e.takeDamage(this.shield.novaDamage, null);
                                }
                            });
                        }
                    }
                }

                if (amount > 0) {
                    this.health -= amount;
                    createParticles(this.x, this.y, 20, '#ff4d4d');
                    updateHealthBar();
                    if (this.health <= 0) {
                        this.health = 0;
                        setGameState('GAMEOVER');
                    }
                }
            }
        }

        class Projectile {
            constructor(x, y, angle, size, speed, color, life = 60, damage = 1, elemental = null) {
                this.x = x; this.y = y; this.size = size; this.speed = speed; this.color = color;
                this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
                this.life = life;
                this.damage = damage;
                this.elemental = elemental;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; }
            draw() {
                ctx.fillStyle = this.elemental ? '#ff6600' : this.color;
                ctx.shadowColor = this.elemental ? '#ff6600' : this.color;
                ctx.shadowBlur = 10;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Enemy {
             constructor(x, y, speedSetting) {
                this.x = x; this.y = y; this.size = Math.random() * 15 + 15;
                const baseSpeed = 1 + (speedSetting - 1) * (2 / 9); // Range 1 to 3
                this.speed = Math.random() * 0.5 + baseSpeed;
                this.health = Math.floor(this.size / 5);
                this.color = '#ff4d4d';
                this.statusEffects = [];
            }
            update() {
                // Status effects
                this.statusEffects.forEach(effect => {
                    this.health -= effect.dps / 60; // Apply damage per frame
                    effect.duration -= 1000/60;
                });
                this.statusEffects = this.statusEffects.filter(effect => effect.duration > 0);
                if (this.health <= 0 && !this.isDestroyed) {
                    this.destroy();
                }

                const dx = player.x - this.x; const dy = player.y - this.y;
                const angle = Math.atan2(dy, dx);
                this.x += Math.cos(angle) * this.speed; this.y += Math.sin(angle) * this.speed;
            }
            draw() {
                const onFire = this.statusEffects.some(e => e.type === 'fire');
                ctx.fillStyle = onFire ? '#ff6600' : this.color;
                ctx.shadowColor = onFire ? '#ff6600' : this.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                if (onFire) {
                    createParticles(this.x, this.y, 1, '#ff6600');
                }
            }
            takeDamage(amount, elemental = null) {
                if (this.isDestroyed) return;
                this.health -= amount;
                if (elemental) {
                    const existingEffect = this.statusEffects.find(e => e.type === elemental.type);
                    if (existingEffect) {
                        existingEffect.duration = Math.max(existingEffect.duration, elemental.duration);
                    } else {
                        this.statusEffects.push({...elemental}); // Add a copy
                    }
                }
                if (this.health <= 0) { this.destroy(); }
            }
            destroy() {
                if (this.isDestroyed) return;
                this.isDestroyed = true;
                createParticles(this.x, this.y, this.size, this.color);
                explosionSound();
                updateScore(Math.floor(this.size));
                generateLoot(this.x, this.y);
            }
        }

        class PowerUp {
            constructor(type) {
                this.type = type; this.size = 15;
                this.x = Math.random() * (gameWidth - 100) + 50;
                this.y = Math.random() * (gameHeight - 100) + 50;
                this.vx = (Math.random() - 0.5) * 1; this.vy = (Math.random() - 0.5) * 1;
                switch(type) {
                    case 'shield': this.color = '#00aaff'; this.symbol = 'S'; break;
                    case 'bomb': this.color = '#ffaa00'; this.symbol = 'B'; break;
                    case 'fast_fire': this.color = '#ffff00'; this.symbol = 'F'; break;
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < this.size || this.x > gameWidth - this.size) this.vx *= -1;
                if (this.y < this.size || this.y > gameHeight - this.size) this.vy *= -1;
            }
            draw() {
                ctx.strokeStyle = this.color;
                ctx.fillStyle = `rgba(${parseInt(this.color.slice(1,3),16)},${parseInt(this.color.slice(3,5),16)},${parseInt(this.color.slice(5,7),16)},0.1)`;
                ctx.shadowColor = this.color; ctx.shadowBlur = 15; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = this.color; ctx.font = 'bold 18px "Roboto Mono"';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.symbol, this.x, this.y);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.size = Math.random() * 3 + 1; this.color = color;
                this.life = Math.random() * 60 + 30; this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5; this.alpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life--; this.alpha = this.life / 60;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.shadowColor = this.color; ctx.shadowBlur = 5;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // --- Loot System ---
        const rarities = {
            common:    { color: '#ffffff', name: 'Common', statMultiplier: 1.0 },
            uncommon:  { color: '#1eff00', name: 'Uncommon', statMultiplier: 1.4 },
            rare:      { color: '#0070dd', name: 'Rare', statMultiplier: 2.0 },
            epic:      { color: '#a335ee', name: 'Epic', statMultiplier: 2.8 },
            legendary: { color: '#ff8000', name: 'Legendary', statMultiplier: 4.0 }
        };

        const manufacturers = {
            "Atlas": {
                name: "Atlas",
                weaponBonus: (stats) => { stats.damage *= 1.1; stats.fireRate *= 0.9; return stats; },
                shieldBonus: (stats) => { stats.capacity *= 1.2; stats.rechargeRate *= 1.1; return stats; }
            },
            "Tediore": {
                name: "Tediore",
                weaponBonus: (stats) => { stats.fireRate *= 0.7; stats.damage *= 0.9; return stats; },
                shieldBonus: (stats) => { stats.capacity *= 0.8; stats.rechargeDelay *= 0.8; return stats; }
            },
            "Maliwan": {
                name: "Maliwan",
                weaponBonus: (stats) => { stats.damage *= 1.0; return stats; }, // Will add elemental later
                shieldBonus: (stats) => { stats.rechargeRate *= 1.5; stats.capacity *= 0.9; return stats; }
            },
            "Vladof": {
                name: "Vladof",
                weaponBonus: (stats) => { stats.fireRate *= 0.5; stats.damage *= 0.85; return stats; },
                shieldBonus: (stats) => { stats.capacity *= 1.0; stats.rechargeDelay *= 1.2; return stats; }
            }
        };

        function generateLoot(x, y) {
            const dropRoll = Math.random();
            // Drop chance: 25% for any loot
            if (dropRoll > 0.75) {
                const typeRoll = Math.random();
                let item;
                if (typeRoll < 0.5) { // 50% chance for Weapon
                    item = generateWeapon();
                } else if (typeRoll < 0.85) { // 35% chance for Shield
                    item = generateShield();
                } else { // 15% chance for Bomb
                    item = generateBomb();
                }
                lootDrops.push(new LootDrop(x, y, item));
            }
        }

        function getRarity() {
            const roll = Math.random();
            if (roll < 0.60) return 'common';    // 60%
            if (roll < 0.85) return 'uncommon';  // 25%
            if (roll < 0.95) return 'rare';      // 10%
            if (roll < 0.99) return 'epic';      // 4%
            return 'legendary';                 // 1%
        }

        function generateBomb() {
             const rarity = getRarity();
             const baseRadius = 75;
             return {
                type: 'bomb',
                rarity: rarity,
                name: `${rarities[rarity].name} Detonator`,
                radius: Math.round((baseRadius * rarities[rarity].statMultiplier) * (Math.random() * 0.4 + 0.8)),
             };
        }

        function generateWeapon() {
            const rarity = getRarity();
            const mfgKeys = Object.keys(manufacturers);
            const mfg = manufacturers[mfgKeys[Math.floor(Math.random() * mfgKeys.length)]];

            let stats = {
                damage: Math.round((5 * rarities[rarity].statMultiplier) * (Math.random() * 0.4 + 0.8)),
                fireRate: Math.max(5, Math.round((20 / rarities[rarity].statMultiplier) * (Math.random() * 0.4 + 0.8))),
                projectileCount: 1,
                elemental: null,
            };

            // Add variety
            if (Math.random() < 0.15) { // 15% chance for a shotgun
                stats.projectileCount = Math.floor(Math.random() * 5) + 3; // 3-7 projectiles
                stats.damage *= 0.4; // Adjust damage for balance
                stats.fireRate *= 1.5;
            }

            let elementalChance = mfg.name === 'Maliwan' ? 0.8 : 0.1;
            if (Math.random() < elementalChance) { // 10% base chance for elemental, 80% for Maliwan
                stats.elemental = { type: 'fire', dps: 5 * rarities[rarity].statMultiplier, duration: 3000 };
            }

            stats = mfg.weaponBonus(stats);

            return {
                type: 'weapon',
                rarity: rarity,
                manufacturer: mfg.name,
                name: `${stats.elemental ? 'Incendiary ' : ''}${mfg.name} ${stats.projectileCount > 1 ? 'Scattergun' : 'Blaster'}`,
                damage: Math.round(stats.damage),
                fireRate: Math.round(stats.fireRate),
                projectileCount: stats.projectileCount,
                elemental: stats.elemental,
            };
        }

        function generateShield() {
            const rarity = getRarity();
            const mfgKeys = Object.keys(manufacturers);
            const mfg = manufacturers[mfgKeys[Math.floor(Math.random() * mfgKeys.length)]];

            let stats = {
                capacity: Math.round((50 * rarities[rarity].statMultiplier) * (Math.random() * 0.4 + 0.8)),
                rechargeRate: Math.round((5 * rarities[rarity].statMultiplier) * (Math.random() * 0.4 + 0.8)),
                rechargeDelay: 3000,
                type: 'standard', // for future shield types
            };

            stats = mfg.shieldBonus(stats);

            // Special shield types
            if (rarity === 'rare' || rarity === 'epic' || rarity === 'legendary') {
                if (Math.random() < 0.2) {
                    stats.type = 'nova';
                    stats.novaDamage = 50 * rarities[rarity].statMultiplier;
                    stats.novaRadius = 100 * rarities[rarity].statMultiplier;
                }
            }


            return {
                type: 'shield',
                rarity: rarity,
                manufacturer: mfg.name,
                name: `${stats.type === 'nova' ? 'Nova ' : ''}${mfg.name} ${rarities[rarity].name} Deflector`,
                capacity: Math.round(stats.capacity),
                rechargeRate: Math.round(stats.rechargeRate),
                rechargeDelay: Math.round(stats.rechargeDelay),
                shieldType: stats.type,
                novaDamage: stats.novaDamage,
                novaRadius: stats.novaRadius,
            };
        }

        class LootDrop {
            constructor(x, y, item) {
                this.x = x;
                this.y = y;
                this.item = item;
                this.size = 12;
                this.life = 1200; // 20 seconds
            }

            update() {
                this.life--;
            }

            draw() {
                const rarityColor = rarities[this.item.rarity].color;
                ctx.save();
                ctx.translate(this.x, this.y);

                // Pulsing glow
                const pulse = Math.abs(Math.sin(Date.now() / 300));
                ctx.shadowColor = rarityColor;
                ctx.shadowBlur = 10 + pulse * 10;

                // Diamond shape
                ctx.fillStyle = rarityColor;
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size, 0);
                ctx.lineTo(0, this.size);
                ctx.lineTo(-this.size, 0);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // --- Game Logic Functions ---
        function init() {
            player = new Player(gameWidth / 2, gameHeight / 2, gameSpeed);
            projectiles = []; enemies = []; powerUps = []; particles = []; lootDrops = [];
            score = 0; playerAnswer = '';
            updateScore(0); generateEquation(); updatePlayerInputDisplay();
            updateHealthBar();
            updateShieldBar();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, gameWidth, gameHeight);
            drawGrid();

            if (gameState === 'PLAYING' || gameState === 'OVERDRIVE') {
                player.update();

                // Spawners
                enemySpawnTimer++;
                const spawnThreshold = 150 - (difficulty * 3); // Adjusted for 30 levels
                if (enemySpawnTimer > spawnThreshold) {
                    spawnEnemy(); enemySpawnTimer = 0;
                }

                powerUpSpawnTimer++;
                if (powerUpSpawnTimer > 600 && powerUps.length < 3) {
                    spawnPowerUp(); powerUpSpawnTimer = 0;
                }

                // Update entities
                projectiles.forEach(p => p.update());
                enemies.forEach(e => e.update());
                powerUps.forEach(p => p.update());
                particles.forEach(p => p.update());
                lootDrops.forEach(l => l.update());

                handleCollisions();

                projectiles = projectiles.filter(p => p.life > 0 && p.x > 0 && p.x < gameWidth && p.y > 0 && p.y < gameHeight);
                enemies = enemies.filter(e => !e.isDestroyed);
                powerUps = powerUps.filter(p => !p.isCollected);
                particles = particles.filter(p => p.life > 0);
                lootDrops = lootDrops.filter(l => l.life > 0 && !l.isCollected);
            }

            // Draw entities (even when paused)
            if (gameState !== 'START') {
                particles.forEach(p => p.draw());
                powerUps.forEach(p => p.draw());
                lootDrops.forEach(l => l.draw());
                projectiles.forEach(p => p.draw());
                enemies.forEach(e => e.draw());
                player.draw();
            }

            ctx.shadowBlur = 0;

            if (gameState === 'OVERDRIVE') {
                overdriveTimer -= 1000 / 60;
                if (overdriveTimer <= 0) { setGameState('PLAYING'); }
                updateOverdriveBar();
            }

            if (gameState === 'PAUSED') {
                pauseTimer -= 1000 / 60;
                if (pauseTimer <= 0) {
                    setGameState('PLAYING');
                }
                drawPauseOverlay();
            }

            requestAnimationFrame(gameLoop);
        }

        function handleCollisions() {
            projectiles.forEach(p => {
                enemies.forEach(e => {
                    if (Math.hypot(p.x - e.x, p.y - e.y) < p.size + e.size / 2) {
                        e.takeDamage(p.damage, p.elemental);
                        p.life = 0;
                        createParticles(p.x, p.y, 5, p.color);
                    }
                });
            });

            enemies.forEach(e => {
                if (Math.hypot(player.x - e.x, player.y - e.y) < player.size + e.size / 2) {
                    e.destroy();
                    player.takeDamage(10);
                }
            });

            powerUps.forEach(p => {
                if (Math.hypot(player.x - p.x, player.y - p.y) < player.size + p.size) {
                    activatePowerUp(p);
                    p.isCollected = true;
                }
            });

            lootDrops.forEach(l => {
                if (Math.hypot(player.x - l.x, player.y - l.y) < player.size + l.size) {
                    activateLoot(l);
                    l.isCollected = true;
                }
            });
        }

        function activateLoot(loot) {
            powerupSound();
            createParticles(loot.x, loot.y, 30, rarities[loot.item.rarity].color);
            switch(loot.item.type) {
                case 'weapon':
                    player.weapon = loot.item;
                    break;
                case 'shield':
                    player.shield = loot.item;
                    player.shield.current = loot.item.capacity; // Refill shield on pickup
                    player.shield.rechargeTimer = 0;
                    updateShieldBar();
                    break;
                case 'bomb':
                    // Detonate bomb on pickup
                    createParticles(loot.x, loot.y, 50, rarities[loot.item.rarity].color);
                    explosionSound();
                    enemies.forEach(e => {
                        if (Math.hypot(loot.x - e.x, loot.y - e.y) < loot.item.radius) {
                            e.takeDamage(100, null); // Bombs do massive damage
                        }
                    });
                    break;
            }
        }

        function activatePowerUp(powerUp) {
            powerupSound(); createParticles(powerUp.x, powerUp.y, 30, powerUp.color);
            switch(powerUp.type) {
                case 'shield':
                    player.shield.current = player.shield.capacity;
                    updateShieldBar();
                    break;
                case 'bomb': enemies.forEach(e => e.destroy()); enemies = []; break;
                case 'fast_fire': player.fastFireTimer = 300; break;
            }
        }

        function checkAnswer() {
            if (playerAnswer === currentEquation.answer) {
                answerCorrectSound();
                updateScore(50 * difficulty);

                // Bomb effect: destroy all enemies
                enemies.forEach(e => e.destroy());
                enemies = [];

                generateEquation();
            } else {
                answerIncorrectSound();
                createParticles(player.x, player.y, 15, '#ff0000');
            }
            playerAnswer = '';
            updatePlayerInputDisplay();
        }

        function generateEquation() {
            let num1, num2, op, answer;

            // Clamp difficulty just in case
            const level = Math.max(1, Math.min(30, difficulty));

            if (level <= 10) { // Levels 1-10: Addition Focus
                op = '+';
                const maxNum = Math.floor(5 + (level - 1) * 2.5); // Scales from 5 to 30
                num1 = Math.floor(Math.random() * maxNum) + 1;
                num2 = Math.floor(Math.random() * maxNum) + 1;
                answer = num1 + num2;

            } else if (level <= 20) { // Levels 11-20: Subtraction Introduced
                const maxNum1 = Math.floor(30 + (level - 11) * 3); // Scales from 30 to 60
                const maxNum2 = Math.floor(20 + (level - 11) * 3); // Scales from 20 to 50

                if (Math.random() > 0.5) { // Addition
                    op = '+';
                    num1 = Math.floor(Math.random() * maxNum1) + 10;
                    num2 = Math.floor(Math.random() * maxNum2) + 1;
                    answer = num1 + num2;
                } else { // Subtraction
                    op = '-';
                    num1 = Math.floor(Math.random() * maxNum1) + maxNum2; // Ensure num1 is large enough
                    num2 = Math.floor(Math.random() * maxNum2) + 1;
                    answer = num1 - num2;
                }

            } else { // Levels 21-30: Two-Digit Operations
                const minNum = 10;
                const maxNum = Math.floor(70 + (level - 21) * 2.9); // Scales from 70 to ~99

                if (Math.random() > 0.5) { // Addition
                    op = '+';
                    num1 = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
                    num2 = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
                    answer = num1 + num2;
                } else { // Subtraction
                    op = '-';
                    // Ensure no negative answers
                    const a = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
                    const b = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
                    num1 = Math.max(a, b);
                    num2 = Math.min(a, b);
                    answer = num1 - num2;
                }
            }

            currentEquation.text = `${num1} ${op} ${num2} = ?`;
            currentEquation.answer = answer.toString();
            equationDisplay.textContent = currentEquation.text;
        }

        function spawnEnemy() {
            const edge = Math.floor(Math.random() * 4); let x, y;
            if (edge === 0) { x = 0; y = Math.random() * gameHeight; }
            else if (edge === 1) { x = gameWidth; y = Math.random() * gameHeight; }
            else if (edge === 2) { x = Math.random() * gameWidth; y = 0; }
            else { x = Math.random() * gameWidth; y = gameHeight; }
            enemies.push(new Enemy(x, y, gameSpeed));
        }

        function spawnPowerUp() {
            const types = ['shield', 'bomb', 'fast_fire'];
            powerUps.push(new PowerUp(types[Math.floor(Math.random() * types.length)]));
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) { particles.push(new Particle(x, y, color)); }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.1)'; ctx.lineWidth = 1;
            for (let x = 0; x < gameWidth; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, gameHeight); ctx.stroke(); }
            for (let y = 0; y < gameHeight; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(gameWidth, y); ctx.stroke(); }
        }

        function drawPauseOverlay() {
            ctx.save();
            ctx.fillStyle = 'rgba(13, 12, 29, 0.7)';
            ctx.fillRect(0, 0, gameWidth, gameHeight);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 48px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20;
            ctx.fillText('PAUSED', gameWidth / 2, gameHeight / 2 - 20);

            // Draw the timer countdown bar
            const barWidth = gameWidth * 0.3;
            const barHeight = 15;
            const barX = (gameWidth - barWidth) / 2;
            const barY = gameHeight / 2 + 40;
            const remainingPercent = Math.max(0, pauseTimer / PAUSE_DURATION);

            ctx.fillStyle = '#3a3a5e';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(barX, barY, barWidth * remainingPercent, barHeight);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);

            ctx.restore();
        }

        // --- UI Update Functions ---
        function updateScore(amount) { score += amount; scoreDisplay.textContent = score; }
        function updateHealthBar() { healthBar.style.width = `${(player.health / player.maxHealth) * 100}%`; }
        function updateShieldBar() {
            if (player && player.shield) {
                const shieldPercentage = (player.shield.current / player.shield.capacity) * 100;
                shieldBar.style.width = `${shieldPercentage}%`;
            }
        }
        function updatePlayerInputDisplay() { playerInputDisplay.textContent = playerAnswer || '_'; }
        function updateOverdriveBar() { overdriveBar.style.width = `${(overdriveTimer / OVERDRIVE_DURATION) * 100}%`; }

        function setGameState(newState) {
            const oldState = gameState;
            gameState = newState;

            if (newState === 'PAUSED') {
                pauseTimer = PAUSE_DURATION;
            } else if (newState === 'PLAYING') {
                if (oldState === 'GAMEOVER' || oldState === 'START') {
                    difficulty = parseInt(difficultySlider.value);
                    gameSpeed = parseInt(speedSlider.value);
                    init();
                    modal.classList.add('hidden');
                    hud.classList.remove('hidden');
                }
                 if (oldState === 'OVERDRIVE') {
                    overdriveTimer = 0;
                    updateOverdriveBar();
                }
            } else if (newState === 'OVERDRIVE') {
                overdriveActivateSound();
                overdriveTimer = OVERDRIVE_DURATION;
            } else if (newState === 'GAMEOVER') {
                modal.classList.remove('hidden');
                hud.classList.add('hidden');
                modalTitle.textContent = 'GAME OVER';
                modalText.textContent = `Your final score on ${['','Easy','Normal','Hard'][difficulty]} difficulty: ${score}`;
                startButton.textContent = 'Retry';
            } else if (newState === 'START') {
                modal.classList.remove('hidden');
                hud.classList.add('hidden');
                modalTitle.textContent = 'GRIDFIRE';
                modalText.innerHTML = `Solve math problems to charge your super-weapon. Survive the onslaught.</p>
                <p class="mb-2 text-sm">CONTROLS:</p>
                <p class="mb-6 text-sm"><span class="font-bold text-cyan-300">WASD</span> Move | <span class="font-bold text-cyan-300">Mouse</span> Aim/Shoot | <span class="font-bold text-cyan-300">0-9</span> Type Answer | <span class="font-bold text-cyan-300">Enter</span> Submit`;
                startButton.textContent = 'Start Game';
            }
        }

        // --- Event Listeners ---
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (gameState === 'PLAYING' || gameState === 'OVERDRIVE' || gameState === 'PAUSED') {
                if (e.key === 'Escape') {
                    setGameState('START');
                } else if (!isNaN(e.key) && e.key.trim() !== '') {
                    playerAnswer += e.key; updatePlayerInputDisplay();
                } else if (e.key === 'Backspace') {
                    playerAnswer = playerAnswer.slice(0, -1); updatePlayerInputDisplay();
                } else if (e.key === 'Enter') {
                    checkAnswer();
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener('mousedown', e => {
            mouse.down = true;
            if (gameState === 'PAUSED') {
                setGameState('PLAYING');
            }
        });
        canvas.addEventListener('mouseup', e => {
            mouse.down = false;
            if (gameState === 'PLAYING') {
                setGameState('PAUSED');
            }
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        startButton.addEventListener('click', () => {
            Tone.start();
            setGameState('PLAYING');
        });

        window.addEventListener('resize', () => {
            gameWidth = Math.min(window.innerWidth * 0.9, 1200);
            gameHeight = Math.min(window.innerHeight * 0.9, 800);
            canvas.width = gameWidth; canvas.height = gameHeight;
            gameContainer.style.width = `${gameWidth}px`;
            gameContainer.style.height = `${gameHeight}px`;
        });

        // --- Start Game ---
        gameLoop();

    </script>
</body>
